name: Generate and Commit index.json

on:
  push:
    branches: [ "master" ]
    paths:
      - 'Posts/**'
      - '.github/workflows/generate-index.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Синхронизация с удалённой веткой
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin master

      - name: Настройка Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Генерация index.json
        run: node scripts/generate-index.js

      - name: Коммит и пуш изменений
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Automatic update index.json'
          file_pattern: 'index.json'
          push_options: '--force-with-lease'
